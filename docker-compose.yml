version: '3.8'
services:
  aegis-api:
    build: ./server
    container_name: aegis-ai-hub
    ports:
      - "3005:3005"
    volumes:
      - ./data/interests.json:/app/data/interests.json
      - ./data/feed_config.json:/app/data/feed_config.json
      - ./dashboard:/app/dashboard
    environment:
      - INTERESTS_PATH=/app/data/interests.json
      - FEEDS_PATH=/app/data/feed_config.json
    env_file:
      - ./server/.env
    restart: always

networks:
  default:
    name: aegis-network
