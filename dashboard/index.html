<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadget Concierge - Fully Dynamic v4.1 Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #38bdf8; --bg: #020617; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0, transparent 50%), radial-gradient(at 50% 0%, rgba(129, 140, 248, 0.1) 0, transparent 50%);
            background-attachment: fixed;
            color: #f1f5f9;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.08); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-6px); background: rgba(30, 41, 59, 0.8); border-color: var(--accent); box-shadow: 0 12px 40px -10px rgba(56, 189, 248, 0.3); }
        .sidebar { height: calc(100vh - 4rem); position: sticky; top: 2rem; }
        .input-glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; padding: 0.75rem 1rem; color: white; width: 100%; transition: all 0.2s; font-size: 1rem; }
        .input-glass:focus { outline: none; border-color: var(--accent); background: rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(90deg, #38bdf8, #818cf8); color: white; font-weight: bold; border-radius: 0.75rem; padding: 0.5rem 1.5rem; transition: transform 0.2s; font-size: 1rem; }
        .btn-primary:active { transform: scale(0.95); }
        .whitespace-nowrap { white-space: nowrap; }
    </style>
</head>
<body class="antialiased text-lg">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-96 p-6 hidden lg:block flex-shrink-0">
            <div class="sidebar glass rounded-3xl p-8 flex flex-col gap-10 overflow-y-auto">
                <div class="text-center">
                    <div class="w-20 h-16 bg-sky-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-sky-500/20">
                        <i class="fas fa-microchip text-3xl text-white"></i>
                    </div>
                    <h2 class="font-bold text-2xl tracking-tighter text-white">GC Engine v4.1</h2>
                </div>

                <!-- Dynamic Navigation -->
                <nav id="dynamic-nav" class="space-y-3">
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-widest mb-4 px-3">Sections</p>
                </nav>

                <!-- Settings Panel -->
                <div class="mt-4 pt-8 border-t border-slate-800 space-y-8">
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-widest px-3">Settings (学習)</p>
                    
                    <div class="px-3">
                        <label class="text-sm text-slate-400 mb-3 block">カテゴリを追加</label>
                        <div class="flex gap-3">
                            <input id="new-cat" type="text" placeholder="例: VR/AR" class="input-glass">
                            <button onclick="updateInterest('category', document.getElementById('new-cat').value)" class="btn-primary flex items-center justify-center w-12"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>

                    <div class="px-3">
                        <label class="text-sm text-slate-400 mb-3 block">キーワードを追加</label>
                        <select id="cat-select" class="input-glass mb-3 bg-slate-800 text-white border-slate-700">
                            <!-- Dynamic Categories -->
                        </select>
                        <div class="flex gap-3">
                            <input id="new-key" type="text" placeholder="例: Minisforum" class="input-glass">
                            <button onclick="updateInterest('keyword', document.getElementById('new-key').value, document.getElementById('cat-select').value)" class="btn-primary flex items-center justify-center w-12"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>

                    <div id="status-msg" class="text-sm text-center hidden p-4 rounded-xl bg-emerald-500/20 text-emerald-400 font-bold"></div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-grow p-4 md:p-8 lg:p-12 overflow-y-auto">
            <header class="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-8">
                <div>
                    <h1 class="text-6xl font-black tracking-tighter mb-6 uppercase">Ultra <span class="text-sky-400">Dashboard</span></h1>
                    <p class="text-xl text-slate-400 leading-relaxed">みつひでさんの好みを完全網羅。自律スクレイピング & 学習型基盤。🚀🎸</p>
                </div>
                <button onclick="fetchDashboard()" class="glass p-6 rounded-2xl text-sky-400 hover:bg-sky-500/10 transition-all font-bold text-xl">
                    <i class="fas fa-sync-alt mr-3"></i> 最新情報を更新
                </button>
            </header>

            <div id="loading" class="hidden flex flex-col items-center justify-center py-32 gap-6">
                <div class="w-16 h-16 border-4 border-sky-500/30 border-t-sky-500 rounded-full animate-spin"></div>
                <p class="text-slate-500 font-mono text-xl text-white">Scraping latest news...</p>
            </div>

            <!-- Dynamic Sections container -->
            <div id="sections-container" class="space-y-24"></div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:3005';
        
        const catIcons = {
            'AI・ソフトウェア': 'fas fa-robot',
            'ゲーム': 'fas fa-gamepad',
            'PC・ハードウェア': 'fas fa-laptop-code',
            'ガジェット': 'fas fa-bolt',
            '音楽・ギター・DTM': 'fas fa-guitar',
            'ロードバイク': 'fas fa-bicycle'
        };

        async function updateInterest(type, value, name = '') {
            if (!value) return;
            const status = document.getElementById('status-msg');
            try {
                await fetch(`${API_BASE}/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, value, name })
                });
                status.textContent = '興味を学習しました！リロード中...';
                status.classList.remove('hidden');
                setTimeout(() => location.reload(), 1500);
            } catch (err) {
                alert('APIサーバーを起動してください。');
            }
        }

        async function fetchDashboard() {
            const loading = document.getElementById('loading');
            const container = document.getElementById('sections-container');
            const nav = document.getElementById('dynamic-nav');
            const select = document.getElementById('cat-select');
            
            loading.classList.remove('hidden');
            
            try {
                const res = await fetch(`${API_BASE}/dashboard`);
                const data = await res.json();
                
                console.log('Dashboard Data Loaded:', data);
                
                // Reset containers
                container.innerHTML = '';
                nav.innerHTML = '<p class="text-xs text-slate-500 uppercase font-bold tracking-widest mb-4 px-3 text-white">Sections</p>';
                select.innerHTML = '';

                // Iterate over all categories returned by API
                let index = 0;
                for (const catName in data) {
                    const articles = data[catName];
                    const icon = catIcons[catName] || 'fas fa-star';
                    const id = `cat-${index++}`;

                    // Update UI even if articles are empty (to show category exists)
                    nav.innerHTML += `
                        <a href="#${id}" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-sky-500/10 text-sky-400 whitespace-nowrap transition-all">
                            <i class="${icon} text-xl text-white"></i> <span class="font-bold text-xl">${catName}</span>
                        </a>
                    `;
                    select.innerHTML += `<option value="${catName}" class="bg-slate-900 text-white">${catName}</option>`;

                    if (articles && articles.length > 0) {
                        const sectionHtml = `
                            <section id="${id}" class="scroll-mt-24">
                                <h2 class="text-4xl font-bold mb-10 flex items-center gap-4 text-sky-400 uppercase tracking-tight">
                                    <i class="${icon} text-white"></i> ${catName} <span class="text-sm text-slate-600 font-normal">(${articles.length} articles)</span>
                                </h2>
                                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                                    ${articles.map(item => renderCard(item)).join('')}
                                </div>
                            </section>
                        `;
                        container.innerHTML += sectionHtml;
                    } else {
                        // Empty state for category
                        container.innerHTML += `
                            <section id="${id}" class="scroll-mt-24 opacity-50">
                                <h2 class="text-4xl font-bold mb-10 flex items-center gap-4 text-slate-600 uppercase tracking-tight">
                                    <i class="${icon}"></i> ${catName} <span class="text-sm font-normal">(No updates today)</span>
                                </h2>
                            </section>
                        `;
                    }
                }

            } catch (e) {
                console.error('Fetch error:', e);
                container.innerHTML = '<div class="text-center py-20 text-rose-400 font-bold text-2xl">APIサーバー（Docker）を起動、またはリロードしてください。</div>';
            } finally {
                loading.classList.add('hidden');
            }
        }

        function renderCard(item) {
            return `
                <div class="card glass rounded-3xl overflow-hidden flex flex-col h-full group border border-white/5">
                    <div class="relative h-56 overflow-hidden bg-slate-800">
                        <img src="${item.img}" class="w-full h-full object-cover opacity-70 group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600'">
                        <div class="absolute top-4 left-4 px-3 py-1 bg-black/60 backdrop-blur-md rounded-lg text-xs font-bold uppercase tracking-widest border border-white/10 text-white">${item.brand}</div>
                        <div class="absolute bottom-4 right-4 w-10 h-10 rounded-full flex items-center justify-center bg-sky-500/30 text-sky-400 text-sm font-black border border-sky-500/40 backdrop-blur-sm">${item.score}</div>
                    </div>
                    <div class="p-8 flex flex-col flex-grow">
                        <h3 class="font-bold text-xl mb-4 line-clamp-2 leading-tight group-hover:text-sky-400 transition-colors text-white">${item.title}</h3>
                        <p class="text-base text-slate-400 mb-6 line-clamp-3 leading-relaxed">${item.desc}</p>
                        <div class="mt-auto pt-6 flex justify-between items-center border-t border-white/5">
                            <a href="${item.link}" target="_blank" class="text-sm font-black uppercase tracking-wider text-sky-400 hover:text-sky-300 transition-all flex items-center gap-2">
                                VIEW ARTICLE <i class="fas fa-external-link-alt text-xs"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        fetchDashboard();
    </script>
</body>
</html>
