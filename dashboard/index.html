<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis AI Hub - Next Gen v5.0</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2338bdf8'><path d='M21 16.5C21 16.88 20.79 17.21 20.47 17.38L12.57 21.82C12.41 21.94 12.21 22 12 22C11.79 22 11.59 21.94 11.43 21.82L3.53 17.38C3.21 17.21 3 16.88 3 16.5V7.5C3 7.12 3.21 6.79 3.53 6.62L11.43 2.18C11.59 2.06 11.79 2 12 2C12.21 2 12.41 2.06 12.57 2.18L20.47 6.62C20.79 6.79 21 7.12 21 7.5V16.5ZM12 4.15L5 8.09V15.91L12 19.85L19 15.91V8.09L12 4.15ZM12 7C10.34 7 9 8.34 9 10C9 11.66 10.34 13 12 13C13.66 13 15 11.66 15 10C15 8.34 13.66 7 12 7Z'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=1.2">
</head>
<body class="antialiased text-lg">
    <!-- ハンバーガーメニューボタン（常時表示） -->
    <button id="menu-toggle" onclick="UI.toggleSidebar()" class="fixed bottom-8 left-8 z-[110] w-16 h-16 bg-sky-500 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all">
        <i class="fas fa-bars text-2xl"></i>
    </button>

    <!-- デバッグログ表示エリア（開発中のみ） -->
    <div id="debug-console" class="fixed bottom-4 right-4 z-50 max-w-md bg-black/80 text-xs text-lime-400 p-4 rounded-xl font-mono hidden overflow-auto max-h-40 border border-white/10"></div>
    <div class="flex min-h-screen">
        <!-- サイドバー：常時非表示（ドロワー形式） -->
        <aside id="sidebar-container" class="fixed inset-y-0 left-0 z-[105] w-1/2 transform -translate-x-full transition-transform duration-300 ease-in-out p-6 flex-shrink-0">
            <div class="sidebar glass rounded-3xl p-8 h-full flex flex-col gap-10 overflow-y-auto overflow-x-hidden border border-white/10 shadow-2xl">
                <!-- 閉じるボタン -->
                <button onclick="UI.toggleSidebar()" class="absolute top-8 right-8 text-slate-400 hover:text-white transition-colors">
                    <i class="fas fa-times text-3xl"></i>
                </button>
                <div class="text-center">
                    <div class="w-20 h-16 bg-sky-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-sky-500/20">
                        <i class="fas fa-microchip text-3xl text-white"></i>
                    </div>
                    <h2 class="font-bold text-2xl tracking-tighter text-white">Aegis Engine v5.0</h2>
                </div>

                <!-- 検索バー（新規追加） -->
                <div class="px-2">
                    <div class="relative">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input id="search-input" type="text" placeholder="キーワードで即座に絞り込み..." 
                               class="input-glass pl-10 text-sm w-full">
                    </div>
                </div>

                <!-- 動的ナビゲーションメニュー -->
                <nav id="dynamic-nav" class="space-y-3 px-2">
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-widest mb-4 px-1">Sections</p>
                </nav>

                <!-- 設定パネル -->
                <div class="mt-4 pt-8 border-t border-slate-800 space-y-8 px-2">
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-widest px-1">Settings (学習)</p>
                    
                    <div>
                        <label class="text-sm text-slate-400 mb-3 block px-1">カテゴリを追加</label>
                        <div class="flex gap-3">
                            <input id="new-cat" type="text" placeholder="例: VR/AR" class="input-glass text-sm flex-grow">
                            <button onclick="updateInterest('category', document.getElementById('new-cat').value)" class="btn-primary flex items-center justify-center w-12 flex-shrink-0"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>

                    <div>
                        <label class="text-sm text-slate-400 mb-3 block px-1">キーワードを追加</label>
                        <select id="cat-select" class="input-glass mb-3 bg-slate-800 text-white border-slate-700 text-sm w-full">
                            <!-- JSによってカテゴリ一覧が注入される -->
                        </select>
                        <div class="flex gap-3">
                            <input id="new-key" type="text" placeholder="例: Minisforum" class="input-glass text-sm flex-grow">
                            <button onclick="updateInterest('keyword', document.getElementById('new-key').value, document.getElementById('cat-select').value)" class="btn-primary flex items-center justify-center w-12 flex-shrink-0"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>

                    <div id="status-msg" class="text-sm text-center hidden p-4 rounded-xl bg-emerald-500/20 text-emerald-400 font-bold"></div>
                </div>
            </div>
        </aside>

        <!-- メインコンテンツエリア -->
        <main class="flex-grow p-4 md:p-8 lg:p-10 overflow-y-auto">
            <header class="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-8">
                <div>
                    <h1 class="text-6xl font-black tracking-tighter mb-6 uppercase">Aegis <span class="text-sky-400">AI Hub</span></h1>
                    <p class="text-xl text-slate-400 leading-relaxed">ユーザーのための「自律型知的エージェント」体験。次世代並列スクレイピング基盤。🛡️🤖</p>
                </div>
                <button onclick="fetchDashboard()" class="glass p-6 rounded-2xl text-sky-400 hover:bg-sky-500/10 transition-all font-bold text-xl">
                    <i class="fas fa-sync-alt mr-3"></i> 最新情報を更新
                </button>
                <!-- Geminiおすすめ生成ボタン -->
                <button id="gemini-btn" onclick="app.fetchRecommendations()" class="relative overflow-hidden p-6 rounded-2xl bg-gradient-to-br from-fuchsia-600 to-violet-700 text-white shadow-lg shadow-fuchsia-500/20 hover:scale-105 active:scale-95 transition-all font-black text-xl group">
                    <span class="relative z-10 flex items-center justify-center">
                        <i class="fas fa-magic mr-3 group-hover:rotate-12 transition-transform"></i> Gemini におすすめを聞く
                    </span>
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_2s_infinite]"></div>
                </button>

                <!-- AI進化提案ボタン -->
                <button id="evolution-btn" onclick="app.showEvolutionProposal()" class="relative overflow-hidden p-6 rounded-2xl bg-gradient-to-br from-cyan-600 to-sky-700 text-white shadow-lg shadow-cyan-500/20 hover:scale-105 active:scale-95 transition-all font-black text-xl group">
                    <span class="relative z-10 flex items-center justify-center">
                        <i class="fas fa-dna mr-3 group-hover:scale-110 transition-transform"></i> システムを進化
                    </span>
                </button>

                <!-- AI再構築ボタン（新規追加） -->
                <button id="restructure-btn" onclick="app.showRestructureProposal()" class="relative overflow-hidden p-6 rounded-2xl bg-gradient-to-br from-indigo-600 to-blue-700 text-white shadow-lg shadow-indigo-500/20 hover:scale-105 active:scale-95 transition-all font-black text-xl group">
                    <span class="relative z-10 flex items-center justify-center">
                        <i class="fas fa-project-diagram mr-3 group-hover:rotate-90 transition-transform"></i> ナレッジ再構築
                    </span>
                </button>
            </header>

            <!-- 進化・再構築提案モーダル -->
            <div id="evolution-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-xl hidden p-4">
                <div class="glass w-full max-w-5xl max-h-[90vh] rounded-[2.5rem] overflow-hidden flex flex-col border border-white/10 shadow-2xl">
                    <div class="p-8 border-b border-white/5 flex justify-between items-center bg-gradient-to-r from-cyan-500/10 to-transparent">
                        <div>
                            <h2 id="modal-title" class="text-3xl font-black text-white tracking-tighter uppercase flex items-center gap-4">
                                <span class="w-12 h-12 bg-cyan-500 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/30">
                                    <i class="fas fa-dna text-xl"></i>
                                </span>
                                AI Evolution <span class="text-cyan-400">Proposal</span>
                            </h2>
                            <p id="modal-subtitle" class="text-slate-400 text-sm mt-1">Gemini 3.1 が提案する次世代の情報収集網と興味セット</p>
                        </div>
                        <button onclick="UI.hideEvolutionModal()" class="w-12 h-12 rounded-full hover:bg-white/10 text-slate-400 transition-all flex items-center justify-center">
                            <i class="fas fa-times text-2xl"></i>
                        </button>
                    </div>
                    <div id="evolution-content" class="flex-grow overflow-y-auto p-8 space-y-12">
                        <!-- ここに提案カードが注入される -->
                    </div>
                    <div class="p-8 border-t border-white/5 flex justify-end gap-6 bg-slate-900/50">
                        <button onclick="UI.hideEvolutionModal()" class="px-8 py-4 rounded-2xl text-slate-400 font-bold hover:text-white transition-all">キャンセル</button>
                        <button id="apply-evolution-btn" onclick="app.applyCurrentProposal()" class="px-10 py-4 rounded-2xl bg-cyan-500 text-white font-black shadow-lg shadow-cyan-500/20 hover:scale-105 active:scale-95 transition-all">
                            選択した項目で確定する
                        </button>
                    </div>
                </div>
            </div>

            <!-- 動的に生成される記事セクションのコンテナ -->
            <div id="sections-container" class="space-y-24">
                <!-- ここにスケルトンまたは記事が注入される -->
            </div>
        </main>
    </div>

    <!-- モジュールとしてJSを読み込み -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
