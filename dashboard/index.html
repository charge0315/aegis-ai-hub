<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis AI Hub - Next Gen v5.0</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2338bdf8'><path d='M21 16.5C21 16.88 20.79 17.21 20.47 17.38L12.57 21.82C12.41 21.94 12.21 22 12 22C11.79 22 11.59 21.94 11.43 21.82L3.53 17.38C3.21 17.21 3 16.88 3 16.5V7.5C3 7.12 3.21 6.79 3.53 6.62L11.43 2.18C11.59 2.06 11.79 2 12 2C12.21 2 12.41 2.06 12.57 2.18L20.47 6.62C20.79 6.79 21 7.12 21 7.5V16.5ZM12 4.15L5 8.09V15.91L12 19.85L19 15.91V8.09L12 4.15ZM12 7C10.34 7 9 8.34 9 10C9 11.66 10.34 13 12 13C13.66 13 15 11.66 15 10C15 8.34 13.66 7 12 7Z'/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=5.0">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="antialiased text-lg overflow-x-hidden">
    <!-- ハンバーガーメニューボタン -->
    <button id="menu-toggle" onclick="UI.toggleSidebar()" class="fixed bottom-8 left-8 z-[110] w-16 h-16 bg-sky-500 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all">
        <i class="fas fa-bars text-2xl"></i>
    </button>

    <!-- デバッグログ -->
    <div id="debug-console" class="fixed bottom-4 right-4 z-50 w-full max-w-lg bg-black/80 text-[11px] text-lime-400 p-6 rounded-2xl font-mono hidden overflow-auto h-56 border border-white/10 backdrop-blur-md shadow-2xl"></div>
    
    <div class="flex min-h-screen">
        <!-- サイドバー -->
        <aside id="sidebar-container" class="fixed inset-y-0 left-0 z-[105] w-[85%] md:w-1/2 transform -translate-x-full transition-transform duration-300 ease-in-out p-6 pb-32">
            <div class="sidebar glass rounded-3xl p-8 h-full flex flex-col gap-10 overflow-y-auto border border-white/10 shadow-2xl">
                <button onclick="UI.toggleSidebar()" class="absolute top-8 right-8 text-slate-400 hover:text-white"><i class="fas fa-times text-3xl"></i></button>
                <div class="text-center">
                    <div class="w-20 h-16 bg-sky-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-sky-500/20"><i class="fas fa-microchip text-3xl text-white"></i></div>
                    <h2 class="font-bold text-2xl tracking-tighter text-white uppercase italic">Aegis Engine</h2>
                </div>
                <div class="px-2">
                    <div class="relative">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input id="search-input" type="text" placeholder="キーワードで絞り込み..." class="input-glass pl-10 text-sm w-full">
                    </div>
                </div>
                <nav id="dynamic-nav" class="space-y-3 px-2">
                    <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-4 px-2 text-white">Sections</p>
                </nav>
                <nav class="space-y-3 px-2 pt-6 border-t border-white/5">
                    <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-4 px-2 text-white">System</p>
                    <a href="javascript:void(0)" onclick="app.showSettings()" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-sky-500/10 text-sky-400 transition-all font-bold">
                        <i class="fas fa-cog text-xl"></i> <span>システム設定</span>
                    </a>
                </nav>
            </div>
        </aside>

        <!-- メインエリア -->
        <main class="flex-grow p-4 md:p-8 lg:p-12 overflow-y-auto">
            <header id="main-header" class="flex flex-col xl:flex-row xl:items-end justify-between mb-20 gap-10">
                <div>
                    <h1 class="text-7xl font-black tracking-tighter mb-6 uppercase">Aegis <span class="text-sky-400">AI Hub</span></h1>
                    <p class="text-2xl text-slate-500 font-medium leading-relaxed">ユーザーのための「自律型知的エージェント」🛡️🤖</p>
                </div>
                <div class="flex flex-wrap items-center justify-end gap-6 shrink-0">
                    <div class="flex bg-black/20 p-1.5 rounded-2xl border border-white/5 backdrop-blur-md">
                        <button id="view-grid-btn" onclick="app.setViewMode('grid')" class="w-12 h-12 rounded-xl flex items-center justify-center transition-all hover:bg-white/5"><i class="fas fa-th-large text-slate-400"></i></button>
                        <button id="view-list-btn" onclick="app.setViewMode('list')" class="w-12 h-12 rounded-xl flex items-center justify-center transition-all hover:bg-white/5"><i class="fas fa-list text-slate-400"></i></button>
                    </div>
                    <button onclick="fetchDashboard()" class="px-8 py-4 glass rounded-2xl text-sky-400 hover:bg-sky-500/10 transition-all font-black text-sm flex items-center gap-3 border border-sky-500/20 active:scale-95"><i class="fas fa-sync-alt"></i> 最新情報を同期</button>
                    <button id="gemini-btn" onclick="app.fetchRecommendations()" class="px-8 py-4 rounded-2xl bg-gradient-to-br from-fuchsia-600 to-violet-700 text-white font-black text-sm hover:scale-105 active:scale-95 transition-all flex items-center gap-3 shadow-lg shadow-fuchsia-500/20"><i class="fas fa-magic"></i> AIのオススメ</button>
                </div>
            </header>

            <!-- 重要なコンテナ群 -->
            <div id="recommendations-container" class="hidden space-y-20 mb-32"></div>

            <div id="evolution-modal" class="fixed inset-0 z-[120] flex items-center justify-center bg-black/80 backdrop-blur-xl hidden p-4">
                <div class="glass w-full max-w-5xl max-h-[90vh] rounded-[2.5rem] overflow-hidden flex flex-col border border-white/10 shadow-2xl">
                    <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/5">
                        <h2 id="modal-title" class="text-3xl font-black text-white uppercase">AI Proposal</h2>
                        <button onclick="UI.hideEvolutionModal()" class="text-slate-400 hover:text-white"><i class="fas fa-times text-2xl"></i></button>
                    </div>
                    <div id="evolution-content" class="flex-grow overflow-y-auto p-8 space-y-8"></div>
                    <div class="p-8 border-t border-white/5 flex justify-end gap-6 bg-slate-900/50">
                        <button onclick="UI.hideEvolutionModal()" class="px-8 py-4 rounded-2xl text-slate-400 font-bold hover:text-white active:scale-95 transition-all">キャンセル</button>
                        <button id="apply-evolution-btn" onclick="app.applyProposalToDraft()" class="px-10 py-4 rounded-2xl bg-cyan-500 text-white font-black shadow-lg hover:scale-105 active:scale-95 transition-all">エディタに取り込む</button>
                    </div>
                </div>
            </div>

            <!-- 設定画面エリア -->
            <div id="settings-container" class="hidden space-y-20 mb-32">
                <div class="settings-header">
                    <div class="space-y-2">
                        <h2 class="text-5xl font-black text-white uppercase tracking-tighter">System <span class="text-sky-400">Settings</span></h2>
                        <p class="text-slate-500 font-bold text-lg">システムの興味関心と情報源を精密にチューニングします</p>
                    </div>
                    <div class="action-bar">
                        <button id="evolution-btn-settings" onclick="app.showEvolutionProposal()" class="btn-core btn-ai-evo active:scale-95"><i class="fas fa-dna"></i> <span>システムを進化</span></button>
                        <button id="restructure-btn-settings" onclick="app.showRestructureProposal()" class="btn-core btn-ai-res active:scale-95"><i class="fas fa-project-diagram"></i> <span>ナレッジ再構築</span></button>
                        <button onclick="app.fetchDashboard()" class="btn-core btn-back active:scale-95"><i class="fas fa-undo-alt"></i> <span>保存しないで戻る</span></button>
                        <button onclick="app.saveAllSettings()" class="btn-core btn-save active:scale-95"><i class="fas fa-save"></i> <span>保存してシステムを更新</span></button>
                    </div>
                </div>

                <div class="tab-container mx-auto xl:mx-0 shadow-2xl">
                    <button onclick="app.switchSettingsTab('feeds')" id="tab-btn-feeds" class="tab-btn active"><i class="fas fa-rss mr-3"></i> フィード管理</button>
                    <button onclick="app.switchSettingsTab('categories')" id="tab-btn-categories" class="tab-btn"><i class="fas fa-tags mr-3"></i> カテゴリ管理</button>
                    <button onclick="app.switchSettingsTab('keywords')" id="tab-btn-keywords" class="tab-btn"><i class="fas fa-search mr-3"></i> ブランド・キーワード</button>
                </div>

                <div id="tab-content-feeds" class="settings-tab-content space-y-12">
                    <div class="section-card flex flex-col md:flex-row justify-between items-center gap-6">
                        <div><h3 class="text-4xl font-black text-white uppercase tracking-tighter">RSS Feed Sources</h3><p class="text-slate-500 font-bold mt-1 text-lg">購読中の情報源URLを管理します</p></div>
                        <button onclick="app.draftAddFeed()" class="px-10 py-5 rounded-2xl bg-sky-600 text-white font-black text-lg hover:scale-105 active:scale-95 transition-all shadow-xl shadow-sky-500/30 flex items-center gap-3"><i class="fas fa-plus"></i> フィードを追加</button>
                    </div>
                    <div id="feed-list" class="px-4"></div>
                </div>

                <div id="tab-content-categories" class="settings-tab-content hidden space-y-12">
                    <div class="section-card flex flex-col md:flex-row justify-between items-center gap-6">
                        <div><h3 class="text-4xl font-black text-white uppercase tracking-tighter">Categories</h3><p class="text-slate-500 font-bold mt-1 text-lg">情報の分類カテゴリを定義します</p></div>
                        <button onclick="app.draftAddInterest('category')" class="px-10 py-5 rounded-2xl bg-sky-600 text-white font-black text-lg hover:scale-105 active:scale-95 transition-all shadow-xl shadow-sky-500/30 flex items-center gap-3"><i class="fas fa-plus"></i> カテゴリを追加</button>
                    </div>
                    <div id="category-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-10 px-4"></div>
                </div>

                <div id="tab-content-keywords" class="settings-tab-content hidden space-y-12">
                    <div class="px-6"><h3 class="text-4xl font-black text-white uppercase tracking-tighter">Brands & Keywords</h3><p class="text-slate-500 font-bold mt-1 text-lg">カテゴリごとにブランドや単語を管理します</p></div>
                    <div id="keyword-list-grouped" class="grid grid-cols-1 gap-12 px-4"></div>
                </div>
            </div>

            <div id="sections-container" class="space-y-32">
                <!-- 記事セクション -->
            </div>
        </main>
    </div>

    <!-- 共通ダイアログ -->
    <div id="custom-dialog-container" class="fixed inset-0 z-[200] flex items-center justify-center bg-black/75 backdrop-blur-md hidden p-4">
        <div class="glass w-full max-w-lg rounded-[2.5rem] overflow-hidden flex flex-col border border-white/10 shadow-2xl scale-95 opacity-0 transition-all duration-300" id="custom-dialog-box">
            <div class="p-10 pb-6"><h3 id="dialog-title" class="text-2xl font-black text-white tracking-tighter uppercase mb-4">Notification</h3><div id="dialog-message" class="text-slate-300 leading-relaxed text-xl"></div></div>
            <div id="dialog-actions" class="p-10 pt-4 flex justify-end gap-6"></div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
